queue_rules:
  - name: default
    merge_conditions: []
    queue_conditions: []
    merge_method: squash
    commit_message_template: |
      SEC[{{ body | get_section("## inj", "NADA") }}]SEC
pull_request_rules:
  - name: q
    conditions: [base=main]
    actions:
      queue:
        name: default