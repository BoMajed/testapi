queue_rules:
  - name: default
    merge_conditions: []
    queue_conditions: []
    merge_method: squash
    commit_message_template: |
      ZZgsec_START
      {{ '## h\nHELLO{{7*7}}WORLD'|get_section('h','NONE') }}
      ZZgsec_END
pull_request_rules:
  - name: q
    conditions: [base=main]
    actions:
      queue:
        name: default