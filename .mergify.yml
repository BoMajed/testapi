queue_rules:
  - name: default
    queue_conditions: []
    merge_conditions:
      - "#approved-reviews-by>=1"
    merge_method: squash
    commit_message_template: |
      FORK[{{ body | get_section("## inj", "NADA") }}]FORK
pull_request_rules:
  - name: autoq
    conditions:
      - base=main
    actions:
      queue:
        name: default